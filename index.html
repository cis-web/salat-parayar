<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ئەپی ئاگادارکردنەوە بە کات</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: white;
            border-radius: 25px;
            padding: 25px;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 10px;
            font-size: 26px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .time-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .time-row input {
            flex: 1;
        }
        
        .time-row select {
            width: auto;
            min-width: 80px;
        }
        
        .options {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 15px;
            margin: 20px 0;
        }
        
        .option-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        
        .option-item label {
            margin-bottom: 0;
            cursor: pointer;
        }
        
        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .quick-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        
        .quick-btn {
            background: #e0e0e0;
            color: #333;
            padding: 10px;
            font-size: 13px;
            margin-top: 0;
        }
        
        .scheduled-list {
            margin-top: 20px;
            background: #f8f9fa;
            border-radius: 15px;
            padding: 15px;
            max-height: 250px;
            overflow-y: auto;
        }
        
        .scheduled-list h3 {
            font-size: 16px;
            margin-bottom: 10px;
            color: #667eea;
        }
        
        .scheduled-item {
            background: white;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #667eea;
        }
        
        .scheduled-info {
            flex: 1;
        }
        
        .scheduled-title {
            font-weight: bold;
            font-size: 14px;
        }
        
        .scheduled-time {
            font-size: 12px;
            color: #666;
        }
        
        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            width: auto;
            margin: 0;
        }
        
        .delete-btn:hover {
            background: #c82333;
        }
        
        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .status.warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 22px;
            }
            
            .quick-buttons {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⏰ ئەپی ئاگادارکردنەوە</h1>
        <div class="subtitle">کات دیاری بکە، ئاگادار دەبیتەوە!</div>
        
        <div class="input-group">
            <label>📝 ناونیشان:</label>
            <input type="text" id="title" placeholder="بۆ نموونە: کاتی نوێژ، کاتی کۆبوونەوە، ...">
        </div>
        
        <div class="input-group">
            <label>💬 پەیام:</label>
            <textarea id="message" placeholder="پەیامی ئاگادارکردنەوە"></textarea>
        </div>
        
        <div class="input-group">
            <label>⏰ دیاریکردنی کات:</label>
            <div class="time-row">
                <input type="time" id="alertTime" step="60">
                <select id="ampm">
                    <option value="AM">پێش نیوەڕۆ</option>
                    <option value="PM">پاش نیوەڕۆ</option>
                </select>
            </div>
        </div>
        
        <div class="options">
            <div class="option-item">
                <label>🔆 ڕووناککردنەوەی شاشە</label>
                <input type="checkbox" id="wakeScreen" checked>
            </div>
            <div class="option-item">
                <label>📳 هەژاندن</label>
                <input type="checkbox" id="vibrate" checked>
            </div>
            <div class="option-item">
                <label>🔊 دەنگ</label>
                <input type="checkbox" id="playSound" checked>
            </div>
        </div>
        
        <button onclick="scheduleAlert()">
            📅 دیاریکردنی ئاگادارکردنەوە
        </button>
        
        <div class="quick-buttons">
            <button class="quick-btn" onclick="quickTimeAlert(1, 30, 'پێشنیار', 'کاتی ١:٣٠ گەیشتە!')">
                🕐 ١:٣٠
            </button>
            <button class="quick-btn" onclick="quickTimeAlert(2, 0, 'دووەم کات', 'کاتی ٢:٠٠ گەیشتە!')">
                🕑 ٢:٠٠
            </button>
            <button class="quick-btn" onclick="quickTimeAlert(3, 30, 'سێیەم کات', 'کاتی ٣:٣٠ گەیشتە!')">
                🕞 ٣:٣٠
            </button>
            <button class="quick-btn" onclick="quickTimeAlert(5, 0, 'پێنجەم کات', 'کاتی ٥:٠٠ گەیشتە!')">
                🕔 ٥:٠٠
            </button>
        </div>
        
        <div class="scheduled-list" id="scheduledList">
            <h3>📋 ئاگادارکردنەوە دیاریکراوەکان</h3>
            <div id="alertsList"></div>
        </div>
        
        <div id="status" class="status"></div>
    </div>
    
    <script>
        // هەڵگرتنی ئاگادارکردنەوەکان
        let scheduledAlerts = [];
        
        // بارکردنی ئاگادارکردنەوەکان لە LocalStorage
        function loadAlerts() {
            const saved = localStorage.getItem('scheduledAlerts');
            if (saved) {
                scheduledAlerts = JSON.parse(saved);
                updateAlertsList();
                startChecker();
            }
        }
        
        // هەڵگرتنی ئاگادارکردنەوەکان لە LocalStorage
        function saveAlerts() {
            localStorage.setItem('scheduledAlerts', JSON.stringify(scheduledAlerts));
            updateAlertsList();
        }
        
        // نوێکردنەوەی لیست
        function updateAlertsList() {
            const container = document.getElementById('alertsList');
            if (scheduledAlerts.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">هیچ ئاگادارکردنەوەیەک دیاری نەکراوە</div>';
                return;
            }
            
            let html = '';
            scheduledAlerts.forEach((alert, index) => {
                html += `
                    <div class="scheduled-item">
                        <div class="scheduled-info">
                            <div class="scheduled-title">${alert.title}</div>
                            <div class="scheduled-time">${alert.time} - ${alert.message}</div>
                        </div>
                        <button class="delete-btn" onclick="deleteAlert(${index})">🗑️ لابردن</button>
                    </div>
                `;
            });
            container.innerHTML = html;
        }
        
        // لابردنی ئاگادارکردنەوە
        function deleteAlert(index) {
            scheduledAlerts.splice(index, 1);
            saveAlerts();
            showStatus('ئاگادارکردنەوە لابرا', true);
        }
        
        // نیشاندانی ستاتوس
        function showStatus(message, isSuccess = true, isWarning = false) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            if (isWarning) {
                statusDiv.className = 'status warning';
            } else {
                statusDiv.className = `status ${isSuccess ? 'success' : 'error'}`;
            }
            statusDiv.style.display = 'block';
            
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 3000);
        }
        
        // دەنگ لێدان
        function playBeep() {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.value = 880;
                gainNode.gain.value = 0.5;
                
                oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 1);
                oscillator.stop(audioContext.currentTime + 1);
                
                audioContext.resume();
            } catch(e) {
                console.log('دەنگ نەکرا');
            }
        }
        
        // هەژاندن
        function vibratePhone() {
            if (navigator.vibrate) {
                navigator.vibrate([500, 200, 500, 200, 500]);
            }
        }
        
        // ناردنی ئاگادارکردنەوە
        function sendNotification(title, message, playSound, vibrateEnabled) {
            if (playSound) {
                playBeep();
            }
            
            if (vibrateEnabled && navigator.vibrate) {
                vibratePhone();
            }
            
            if (Notification.permission === "granted") {
                const notification = new Notification(title, {
                    body: message,
                    icon: 'https://cdn-icons-png.flaticon.com/512/190/190411.png',
                    badge: 'https://cdn-icons-png.flaticon.com/512/190/190411.png',
                    silent: !playSound,
                    vibrate: vibrateEnabled ? [200, 100, 200, 100, 200] : undefined,
                    requireInteraction: true,
                    tag: 'important-notification'
                });
                
                notification.onclick = function() {
                    window.focus();
                    notification.close();
                };
                
                // ڕووناککردنەوەی شاشە
                if (screen.keepAwake) {
                    screen.keepAwake = true;
                    setTimeout(() => {
                        screen.keepAwake = false;
                    }, 10000);
                }
            }
        }
        
        // دیاریکردنی کات
        function scheduleAlert() {
            const title = document.getElementById('title').value;
            const message = document.getElementById('message').value;
            let time = document.getElementById('alertTime').value;
            const ampm = document.getElementById('ampm').value;
            const wakeScreen = document.getElementById('wakeScreen').checked;
            const vibrateEnabled = document.getElementById('vibrate').checked;
            const playSound = document.getElementById('playSound').checked;
            
            if (!title || !message) {
                showStatus('تکایە ناونیشان و پەیام پڕ بکەرەوە!', false);
                return;
            }
            
            if (!time) {
                showStatus('تکایە کات دیاری بکە!', false);
                return;
            }
            
            // گۆڕینی کات بۆ 24 کاتژمێری
            let [hours, minutes] = time.split(':');
            hours = parseInt(hours);
            
            if (ampm === 'PM' && hours !== 12) {
                hours += 12;
            } else if (ampm === 'AM' && hours === 12) {
                hours = 0;
            }
            
            const now = new Date();
            const alertTime = new Date();
            alertTime.setHours(hours, minutes, 0, 0);
            
            // ئەگەر کات تێپەڕیبوو، بۆ سبەینێ دیاری بکە
            if (alertTime <= now) {
                alertTime.setDate(alertTime.getDate() + 1);
            }
            
            const timeString = alertTime.toLocaleTimeString('ku', { hour: '2-digit', minute: '2-digit' });
            const dateString = alertTime.toLocaleDateString('ku');
            
            const alertData = {
                id: Date.now(),
                title: title,
                message: message,
                time: `${timeString} - ${dateString}`,
                timestamp: alertTime.getTime(),
                wakeScreen: wakeScreen,
                vibrate: vibrateEnabled,
                playSound: playSound
            };
            
            scheduledAlerts.push(alertData);
            saveAlerts();
            
            showStatus(`✅ ئاگادارکردنەوە بۆ کاتی ${timeString} دیاری کرا!`);
            
            // خاوێنکردنەوە
            document.getElementById('title').value = '';
            document.getElementById('message').value = '';
            document.getElementById('alertTime').value = '';
        }
        
        // ئاگادارکردنەوەی خێرا بە کات
        function quickTimeAlert(hour, minute, title, message) {
            const now = new Date();
            const alertTime = new Date();
            alertTime.setHours(hour, minute, 0, 0);
            
            if (alertTime <= now) {
                alertTime.setDate(alertTime.getDate() + 1);
            }
            
            const timeString = alertTime.toLocaleTimeString('ku', { hour: '2-digit', minute: '2-digit' });
            const dateString = alertTime.toLocaleDateString('ku');
            
            const alertData = {
                id: Date.now(),
                title: title,
                message: message,
                time: `${timeString} - ${dateString}`,
                timestamp: alertTime.getTime(),
                wakeScreen: true,
                vibrate: true,
                playSound: true
            };
            
            scheduledAlerts.push(alertData);
            saveAlerts();
            
            showStatus(`✅ ئاگادارکردنەوە بۆ کاتی ${timeString} دیاری کرا!`);
        }
        
        // پشکنینی کاتەکان
        let checkerInterval;
        
        function startChecker() {
            if (checkerInterval) clearInterval(checkerInterval);
            
            checkerInterval = setInterval(() => {
                const now = Date.now();
                const alertsToTrigger = [];
                
                scheduledAlerts.forEach((alert, index) => {
                    if (alert.timestamp <= now) {
                        alertsToTrigger.push({alert, index});
                    }
                });
                
                // ڕیزکردن بە پێچەوانە بۆ لابردنی دروست
                for (let i = alertsToTrigger.length - 1; i >= 0; i--) {
                    const {alert, index} = alertsToTrigger[i];
                    sendNotification(alert.title, alert.message, alert.playSound, alert.vibrate);
                    scheduledAlerts.splice(index, 1);
                }
                
                if (alertsToTrigger.length > 0) {
                    saveAlerts();
                    showStatus(`🔔 ${alertsToTrigger.length} ئاگادارکردنەوە نێردرا!`, true);
                }
            }, 1000); // هەر چرکەیەک پشکنین بکە
        }
        
        // داواکردنی ڕێگەپێدان
        if (Notification.permission !== "granted") {
            Notification.requestPermission();
        }
        
        // بارکردن
        loadAlerts();
        
        // ئەگەر مۆبایل داخرا، هێشتا کاربکات
        window.addEventListener('beforeunload', () => {
            if (checkerInterval) clearInterval(checkerInterval);
        });
    </script>
</body>
</html>
