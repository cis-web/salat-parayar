<!DOCTYPE html>
<html lang="ku">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alarm App</title>

<meta name="theme-color" content="#667eea">
<link rel="manifest" href="manifest.json">

<style>

body{
font-family:sans-serif;
background:#667eea;
padding:20px;
color:white;
text-align:center;
}

.container{
background:white;
color:black;
padding:20px;
border-radius:20px;
max-width:400px;
margin:auto;
}

input,textarea{
width:100%;
padding:10px;
margin:5px 0;
}

button{
width:100%;
padding:12px;
background:#667eea;
color:white;
border:none;
border-radius:10px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h2>🔔 Alarm App</h2>

<input id="title" placeholder="ناونیشان">

<textarea id="message" placeholder="پەیام"></textarea>

<input type="time" id="time">

<button onclick="setAlarm()">دیاریکردنی Alarm</button>

<button onclick="test()">تاقیکردنەوە</button>

</div>

<script>

let alarms=[]

if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js')
}

function playSound(){

let audio=new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg")

audio.loop=true
audio.volume=1
audio.play()

setTimeout(()=>{
audio.pause()
},5000)

}

function vibrate(){

if(navigator.vibrate)
navigator.vibrate([500,200,500,200,500])

}

function notify(title,message){

navigator.serviceWorker.getRegistration().then(reg=>{

reg.showNotification(title,{
body:message,
icon:"https://cdn-icons-png.flaticon.com/512/190/190411.png",
vibrate:[500,200,500],
requireInteraction:true
})

})

}

function setAlarm(){

let title=document.getElementById("title").value
let message=document.getElementById("message").value
let time=document.getElementById("time").value

if(!time) return alert("کات دیاری بکە")

let [h,m]=time.split(":")

let now=new Date()

let alarm=new Date()

alarm.setHours(h)
alarm.setMinutes(m)
alarm.setSeconds(0)

if(alarm<now) alarm.setDate(alarm.getDate()+1)

alarms.push({
title,
message,
time:alarm.getTime()
})

alert("Alarm دانرا")

}

function test(){

playSound()
vibrate()
notify("Test Alarm","ئەگەر دەنگ و vibration هات کاردەکات")

}

setInterval(()=>{

let now=Date.now()

alarms.forEach((a,i)=>{

if(now>=a.time){

playSound()
vibrate()
notify(a.title,a.message)

alarms.splice(i,1)

}

})

},1000)

</script>

</body>
</html>
