<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بانگی سلێمانی</title>
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="./manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Space+Mono:wght@400;700&family=Noto+Kufi+Arabic:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f; --surface:#111118; --surface2:#18181f;
  --gold:#c9a84c; --gold2:#e8c97a; --gold-dim:rgba(201,168,76,0.15);
  --text:#e8e4d8; --text-dim:#7a7568;
  --green:#4caf7d; --red:#c94c4c;
  --mono:"Space Mono",monospace;
  --kurd:"Noto Kufi Arabic",sans-serif;
  --arabic:"Amiri",serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--kurd);background:var(--bg);min-height:100vh;color:var(--text);direction:rtl;overflow-x:hidden;}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(201,168,76,.07) 0%,transparent 70%),radial-gradient(ellipse 60% 40% at 20% 80%,rgba(76,175,125,.04) 0%,transparent 60%);pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:460px;margin:0 auto;padding:0 16px 60px;}

/* header */
.header{text-align:center;padding:36px 0 16px;}
.header-arabic{font-family:var(--arabic);font-size:30px;color:var(--gold);line-height:1.4;text-shadow:0 0 30px rgba(201,168,76,.4);}
.header-city{font-family:var(--mono);font-size:10px;letter-spacing:4px;color:var(--text-dim);text-transform:uppercase;margin-top:4px;}

/* clock */
.clock-wrap{text-align:center;margin:20px 0 24px;}
.clock-ring{width:160px;height:160px;margin:0 auto 10px;position:relative;}
.clock-ring svg{position:absolute;inset:0;transform:rotate(-90deg);}
.clock-ring .track{fill:none;stroke:rgba(201,168,76,.1);stroke-width:3;}
.clock-ring .progress{fill:none;stroke:var(--gold);stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset 1s linear;filter:drop-shadow(0 0 6px rgba(201,168,76,.5));}
.clock-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.clock-time{font-family:var(--mono);font-size:32px;font-weight:700;color:var(--text);letter-spacing:2px;}
.clock-date{font-size:10px;color:var(--text-dim);margin-top:3px;}
.hijri-text{font-family:var(--arabic);font-size:15px;color:var(--text-dim);}

/* status */
.status-card{background:var(--surface);border:1px solid rgba(255,255,255,.05);border-radius:14px;padding:13px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.status-item{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text-dim);}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--text-dim);}
.status-dot.ok{background:var(--green);box-shadow:0 0 6px var(--green);}
.status-dot.err{background:var(--red);}
.status-dot.wait{background:var(--gold);box-shadow:0 0 6px var(--gold);}

/* perm banner */
.perm-banner{background:linear-gradient(135deg,rgba(201,168,76,.1),rgba(76,175,125,.05));border:1px solid rgba(201,168,76,.3);border-radius:16px;padding:18px 20px;margin-bottom:14px;text-align:center;}
.perm-banner p{font-size:13px;color:var(--text);margin-bottom:12px;line-height:1.7;}

/* btn */
.btn{width:100%;padding:13px;border:none;border-radius:12px;font-family:var(--kurd);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-gold{background:linear-gradient(135deg,var(--gold),#a07830);color:#0a0a0f;box-shadow:0 4px 20px rgba(201,168,76,.3);}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(201,168,76,.45);}

/* next card */
.next-card{background:linear-gradient(135deg,rgba(201,168,76,.1),rgba(201,168,76,.02));border:1px solid rgba(201,168,76,.25);border-radius:20px;padding:22px 20px;margin-bottom:14px;position:relative;overflow:hidden;text-align:center;}
.next-card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.next-label{font-size:10px;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase;margin-bottom:8px;}
.next-name{font-family:var(--arabic);font-size:38px;color:var(--gold);line-height:1.2;margin-bottom:3px;text-shadow:0 0 20px rgba(201,168,76,.3);}
.next-name-ku{font-size:12px;color:var(--text-dim);margin-bottom:14px;}
.next-countdown{font-family:var(--mono);font-size:40px;font-weight:700;color:var(--text);letter-spacing:3px;}
.next-countdown span{font-size:14px;color:var(--text-dim);vertical-align:middle;margin:0 1px;}
.next-time-row{margin-top:10px;font-size:12px;color:var(--text-dim);}
.next-time-row strong{font-family:var(--mono);color:var(--gold2);}

/* prayer list */
.prayers-card{background:var(--surface);border:1px solid rgba(255,255,255,.05);border-radius:20px;overflow:hidden;margin-bottom:14px;}
.prayer-row{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.04);transition:background .3s;}
.prayer-row:last-child{border-bottom:none;}
.prayer-row.is-next{background:rgba(201,168,76,.06);}
.prayer-row.is-done{opacity:.35;}
.prayer-indicator{width:8px;height:8px;border-radius:50%;background:var(--text-dim);flex-shrink:0;margin-left:12px;transition:all .3s;}
.prayer-row.is-next .prayer-indicator{background:var(--gold);box-shadow:0 0 8px var(--gold);animation:pulse 1.5s ease-in-out infinite;}
.prayer-row.is-done .prayer-indicator{background:var(--green);}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.4);opacity:.6;}}
.prayer-info{flex:1;}
.prayer-arabic{font-family:var(--arabic);font-size:19px;color:var(--text);line-height:1.3;}
.prayer-row.is-next .prayer-arabic{color:var(--gold);}
.prayer-ku{font-size:10px;color:var(--text-dim);margin-top:1px;}
.prayer-time{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--text);}
.prayer-row.is-next .prayer-time{color:var(--gold2);}
.prayer-cd{font-family:var(--mono);font-size:10px;color:var(--text-dim);text-align:left;min-width:52px;margin-right:10px;}
.prayer-row.is-next .prayer-cd{color:var(--gold);}

/* loading / error */
.loading{text-align:center;padding:40px 20px;color:var(--text-dim);font-size:13px;}
.loading-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--gold);margin:0 3px;animation:bounce 1.2s ease-in-out infinite;}
.loading-dot:nth-child(2){animation-delay:.2s;}.loading-dot:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,100%{transform:translateY(0);opacity:.4;}50%{transform:translateY(-8px);opacity:1;}}
.error-box{background:rgba(201,76,76,.1);border:1px solid rgba(201,76,76,.3);border-radius:12px;padding:16px;text-align:center;font-size:13px;color:#e88;margin-bottom:14px;}
.retry-btn{background:rgba(201,76,76,.2);border:1px solid rgba(201,76,76,.4);color:#e88;padding:8px 20px;border-radius:8px;cursor:pointer;font-family:var(--kurd);font-size:13px;margin-top:10px;}

/* toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:1px solid rgba(201,168,76,.3);color:var(--gold2);padding:11px 22px;border-radius:30px;font-size:13px;box-shadow:0 8px 32px rgba(0,0,0,.5);transition:transform .4s cubic-bezier(.34,1.56,.64,1);z-index:1000;white-space:nowrap;max-width:90vw;text-align:center;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* overlay */
.ring-overlay{position:fixed;inset:0;background:rgba(201,168,76,.05);pointer-events:none;z-index:999;opacity:0;transition:opacity .3s;}
.ring-overlay.active{opacity:1;animation:ring-flash .6s ease-in-out 8;}
@keyframes ring-flash{0%,100%{background:rgba(201,168,76,.03);}50%{background:rgba(201,168,76,.14);}}
</style>
</head>
<body>
<div class="ring-overlay" id="ringOverlay"></div>
<div class="toast" id="toast"></div>
<div class="app">

  <div class="header">
    <div class="header-arabic">بانگی سلێمانی</div>
    <div class="header-city">SULAYMANIYAH · IRAQ</div>
  </div>

  <div class="perm-banner" id="permBanner" style="display:none">
    <p>بۆ وەرگرتنی ئاگادارکردنەوەی بانگ<br><strong style="color:var(--gold)">یەک جار</strong> ڕێگەپێدان پێویستە</p>
    <button class="btn btn-gold" onclick="askPermOnce()">🔔 ڕێگەپێدان بدە</button>
  </div>

  <div class="clock-wrap">
    <div class="clock-ring">
      <svg viewBox="0 0 160 160">
        <circle class="track" cx="80" cy="80" r="72"/>
        <circle class="progress" id="clockRing" cx="80" cy="80" r="72" stroke-dasharray="452.4" stroke-dashoffset="452.4"/>
      </svg>
      <div class="clock-inner">
        <div class="clock-time" id="clockTime">--:--</div>
        <div class="clock-date" id="clockDate"></div>
      </div>
    </div>
    <div class="hijri-text" id="hijriDate">—</div>
  </div>

  <div class="status-card">
    <div class="status-item"><div class="status-dot" id="dotApi"></div><span id="lblApi">بارکردن...</span></div>
    <div class="status-item"><div class="status-dot" id="dotNotif"></div><span id="lblNotif">ئاگادارکردنەوە</span></div>
    <div class="status-item"><div class="status-dot ok" id="dotSound"></div><span>دەنگی بانگ</span></div>
  </div>

  <div id="loadingBox" class="loading">
    <span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span>
    <div style="margin-top:14px">کاتی بانگەکان بارئەکرێت...</div>
  </div>

  <div id="errorBox" class="error-box" style="display:none">
    ❌ کێشە لە بارکردنی کاتەکان<br>
    <button class="retry-btn" onclick="loadPrayerTimes()">🔄 دووبارە هەوڵبدەرەوە</button>
  </div>

  <div id="nextCard" class="next-card" style="display:none">
    <div class="next-label">بانگی داهاتوو</div>
    <div class="next-name" id="nextName">—</div>
    <div class="next-name-ku" id="nextNameKu">—</div>
    <div class="next-countdown" id="nextCountdown">--<span>:</span>--<span>:</span>--</div>
    <div class="next-time-row">کاتی بانگ: <strong id="nextTime">--:--</strong></div>
  </div>

  <div id="prayerList" class="prayers-card" style="display:none"></div>

</div>

<script>
const LAT       = 35.5651;
const LNG       = 45.4292;
const METHOD    = 4;
const SCHOOL    = 1;
const PLUS_MIN  = 1;
const ADHAN_URL = "https://firebasestorage.googleapis.com/v0/b/drood-762d5.firebasestorage.app/o/ADHAN-BANG%2Fadhana-makha2-mp3.mp3?alt=media&token=43e507c3-74ba-4f92-bed7-0614da7f4d65";

const PRAYERS = [
  {key:"Fajr",    arabic:"الفجر",  ku:"بەیانی"},
  {key:"Dhuhr",   arabic:"الظهر",  ku:"نیوەڕۆ"},
  {key:"Asr",     arabic:"العصر",  ku:"ئەسر"},
  {key:"Maghrib", arabic:"المغرب", ku:"ئێوارە"},
  {key:"Isha",    arabic:"العشاء", ku:"شەو"},
];

let todayTimes = null;
let scheduledTimers = [];
let currentAudio = null;
let volumeTimer  = null;
let audioUnlocked = false;

// unlock audio
function unlockAudio(){
  if(audioUnlocked) return; audioUnlocked=true;
  const ctx=new(window.AudioContext||window.webkitAudioContext)();
  const b=ctx.createBuffer(1,1,22050),s=ctx.createBufferSource();
  s.buffer=b;s.connect(ctx.destination);s.start(0);ctx.resume();
}
document.addEventListener("touchstart",unlockAudio,{once:true});
document.addEventListener("click",unlockAudio,{once:true});

// permission
function initPermBanner(){
  if(Notification.permission==="default") document.getElementById("permBanner").style.display="block";
  updateNotifDot();
}
function askPermOnce(){
  Notification.requestPermission().then(p=>{
    document.getElementById("permBanner").style.display="none";
    updateNotifDot();
    showToast(p==="granted"?"✅ ڕێگەپێدان وەرگیرا!":"⚠️ ڕێگەپێدان نەدرا");
  });
}
function updateNotifDot(){
  const dot=document.getElementById("dotNotif"),lbl=document.getElementById("lblNotif");
  if(Notification.permission==="granted"){dot.className="status-dot ok";lbl.textContent="ئاگادارکردنەوە چالاکە";}
  else if(Notification.permission==="denied"){dot.className="status-dot err";lbl.textContent="ئاگادارکردنەوە بلۆکە";}
  else{dot.className="status-dot wait";lbl.textContent="ڕێگەپێدان پێویستە";}
}

// clock
function updateClock(){
  const now=new Date();
  const h=String(now.getHours()).padStart(2,"0"),m=String(now.getMinutes()).padStart(2,"0");
  document.getElementById("clockTime").textContent=h+":"+m;
  const days=["یەکشەممە","دووشەممە","سێشەممە","چوارشەممە","پێنجشەممە","هەینی","شەممە"];
  const months=["کانوونی دووەم","شوبات","ئازار","نیسان","ئایار","حوزەیران","تەممووز","ئاب","ئەیلوول","تشرینی یەکەم","تشرینی دووەم","کانوونی یەکەم"];
  document.getElementById("clockDate").textContent=days[now.getDay()]+"، "+now.getDate()+" "+months[now.getMonth()];
  const circ=2*Math.PI*72;
  document.getElementById("clockRing").style.strokeDashoffset=circ*(1-now.getSeconds()/60);
  updateCountdowns();
}
setInterval(updateClock,1000);
updateClock();

// load prayer times
async function loadPrayerTimes(date){
  document.getElementById("loadingBox").style.display="block";
  document.getElementById("errorBox").style.display="none";
  document.getElementById("nextCard").style.display="none";
  document.getElementById("prayerList").style.display="none";

  const d=date||new Date();
  const dd=String(d.getDate()).padStart(2,"0");
  const mm=String(d.getMonth()+1).padStart(2,"0");
  const yyyy=d.getFullYear();
  const url="https://api.aladhan.com/v1/timings/"+dd+"-"+mm+"-"+yyyy+"?latitude="+LAT+"&longitude="+LNG+"&method="+METHOD+"&school="+SCHOOL;

  try{
    const res=await fetch(url);
    const json=await res.json();
    if(json.code!==200) throw new Error("API error");

    const timings=json.data.timings;
    const hijri=json.data.date.hijri;

    todayTimes={};
    for(const p of PRAYERS){
      const parts=timings[p.key].split(":").map(Number);
      const dt=new Date(d);
      dt.setHours(parts[0],parts[1]+PLUS_MIN,0,0);
      todayTimes[p.key]=dt;
    }

    document.getElementById("hijriDate").textContent=hijri.day+" "+hijri.month.ar+" "+hijri.year+" هـ";
    document.getElementById("dotApi").className="status-dot ok";
    document.getElementById("lblApi").textContent="کاتەکان بارکرا ✓";
    document.getElementById("loadingBox").style.display="none";
    document.getElementById("nextCard").style.display="block";
    document.getElementById("prayerList").style.display="block";

    scheduledTimers.forEach(t=>clearTimeout(t));
    scheduledTimers=[];
    scheduleAlarms();
    renderPrayerList();

  }catch(e){
    document.getElementById("loadingBox").style.display="none";
    document.getElementById("errorBox").style.display="block";
    document.getElementById("dotApi").className="status-dot err";
    document.getElementById("lblApi").textContent="کێشە لە API";
  }
}

function scheduleAlarms(){
  const now=Date.now();
  for(const p of PRAYERS){
    const dt=todayTimes[p.key];
    const delay=dt.getTime()-now;
    if(delay>0){
      const t=setTimeout(()=>fireAlarm(p),delay);
      scheduledTimers.push(t);
    }
  }
  // reload at midnight
  const tomorrow=new Date();
  tomorrow.setDate(tomorrow.getDate()+1);
  tomorrow.setHours(0,1,0,0);
  const mt=setTimeout(()=>loadPrayerTimes(tomorrow),tomorrow.getTime()-now);
  scheduledTimers.push(mt);
}

function fireAlarm(prayer){
  playAdhan();
  sendNotification("🕌 "+prayer.arabic,"کاتی بانگی "+prayer.ku+" گەیشت");
  showToast("🔔 کاتی بانگی "+prayer.ku);
  const o=document.getElementById("ringOverlay");
  o.classList.add("active");
  setTimeout(()=>o.classList.remove("active"),5000);
  renderPrayerList();
}

function playAdhan(){
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  if(volumeTimer){clearInterval(volumeTimer);volumeTimer=null;}
  const STEPS=[0.35,0.55,0.75,0.9,1.0];
  let step=0;
  fetch(ADHAN_URL)
    .then(r=>r.blob())
    .then(blob=>{
      const blobUrl=URL.createObjectURL(blob);
      currentAudio=new Audio(blobUrl);
      currentAudio.volume=STEPS[0];
      currentAudio.play().catch(()=>fallbackBeep());
      volumeTimer=setInterval(()=>{
        step++;
        if(currentAudio) currentAudio.volume=STEPS[Math.min(step,STEPS.length-1)];
        if(step>=STEPS.length-1){clearInterval(volumeTimer);volumeTimer=null;}
      },30000);
    })
    .catch(()=>fallbackBeep());
}

function fallbackBeep(){
  const ctx=new(window.AudioContext||window.webkitAudioContext)();
  const b=(f,s,d)=>{
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=f;o.type="sine";
    g.gain.setValueAtTime(0.4,ctx.currentTime+s);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+s+d);
    o.start(ctx.currentTime+s);o.stop(ctx.currentTime+s+d);
  };
  b(660,0,.3);b(880,.4,.3);b(660,.8,.3);b(880,1.2,.6);
}

function sendNotification(title,body){
  if(Notification.permission!=="granted") return;
  navigator.serviceWorker.getRegistration().then(reg=>{
    if(reg) reg.showNotification(title,{body,icon:"https://cdn-icons-png.flaticon.com/512/190/190411.png",vibrate:[400,100,400,100,800],requireInteraction:true,tag:"azan-"+Date.now()});
    else try{new Notification(title,{body});}catch(e){}
  }).catch(()=>{try{new Notification(title,{body});}catch(e){}});
}

function renderPrayerList(){
  if(!todayTimes) return;
  const now=new Date();
  const list=document.getElementById("prayerList");
  let nextKey=null;
  for(const p of PRAYERS){ if(todayTimes[p.key]>now){nextKey=p.key;break;} }
  list.innerHTML=PRAYERS.map(p=>{
    const dt=todayTimes[p.key];
    const hh=String(dt.getHours()).padStart(2,"0");
    const mn=String(dt.getMinutes()).padStart(2,"0");
    const done=dt<=now, isNext=p.key===nextKey;
    let cls="prayer-row";
    if(isNext) cls+=" is-next";
    if(done)   cls+=" is-done";
    return "<div class='"+cls+"' id='row-"+p.key+"'><div class='prayer-indicator'></div><div class='prayer-info'><div class='prayer-arabic'>"+p.arabic+"</div><div class='prayer-ku'>"+p.ku+"</div></div><div class='prayer-cd' id='cd-"+p.key+"'></div><div class='prayer-time'>"+hh+":"+mn+"</div></div>";
  }).join("");
}

function updateCountdowns(){
  if(!todayTimes) return;
  const now=new Date();
  let nextPrayer=null;
  for(const p of PRAYERS){ if(todayTimes[p.key]>now){nextPrayer=p;break;} }

  for(const p of PRAYERS){
    const cdEl=document.getElementById("cd-"+p.key);
    if(!cdEl) continue;
    const rem=todayTimes[p.key]-now;
    if(rem<=0){cdEl.textContent="✓";continue;}
    const hh=Math.floor(rem/3600000),mm=Math.floor((rem%3600000)/60000),ss=Math.floor((rem%60000)/1000);
    cdEl.textContent=hh>0?hh+":"+String(mm).padStart(2,"0")+":"+String(ss).padStart(2,"0"):String(mm).padStart(2,"0")+":"+String(ss).padStart(2,"0");
  }

  if(nextPrayer){
    const dt=todayTimes[nextPrayer.key],rem=dt-now;
    const hh=Math.floor(rem/3600000),mm=Math.floor((rem%3600000)/60000),ss=Math.floor((rem%60000)/1000);
    document.getElementById("nextName").textContent=nextPrayer.arabic;
    document.getElementById("nextNameKu").textContent=nextPrayer.ku;
    document.getElementById("nextCountdown").innerHTML=String(hh).padStart(2,"0")+"<span>:</span>"+String(mm).padStart(2,"0")+"<span>:</span>"+String(ss).padStart(2,"0");
    document.getElementById("nextTime").textContent=String(dt.getHours()).padStart(2,"0")+":"+String(dt.getMinutes()).padStart(2,"0");
  } else {
    document.getElementById("nextName").textContent="هەموو بانگەکان";
    document.getElementById("nextNameKu").textContent="تەواوبوون";
    document.getElementById("nextCountdown").textContent="—";
  }
}

function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  clearTimeout(t._t);
  t._t=setTimeout(()=>t.classList.remove("show"),3500);
}

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("./sw.js").catch(e=>console.warn("SW:",e));
}

initPermBanner();
loadPrayerTimes();
</script>
</body>
</html>
