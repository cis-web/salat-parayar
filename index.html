<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>ئاگادارکەر</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;800&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0b0b14;--card:#13131f;--card2:#1c1c2e;--accent:#e94560;--accent2:#f5a623;--text:#f0f0f8;--muted:#6b6b8a;--green:#00d9a3;--border:#252538;--glow:rgba(233,69,96,0.25)}
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:'Vazirmatn',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
    .orbs{position:fixed;inset:0;z-index:0;pointer-events:none}
    .orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.12}
    .o1{width:400px;height:400px;background:var(--accent);top:-120px;right:-100px}
    .o2{width:300px;height:300px;background:#5c35c5;bottom:0;left:-80px}
    .o3{width:180px;height:180px;background:var(--accent2);top:45%;left:45%}
    .wrap{position:relative;z-index:1;max-width:430px;margin:0 auto;padding-bottom:100px}
    .hdr{padding:36px 20px 16px;text-align:center}
    .clock{font-size:clamp(54px,16vw,80px);font-weight:800;letter-spacing:-2px;line-height:1;background:linear-gradient(140deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .dateline{margin-top:6px;font-size:13px;color:var(--muted)}
    .slabel{padding:18px 20px 10px;font-size:10px;font-weight:700;letter-spacing:2.5px;color:var(--muted);text-transform:uppercase}
    .card{margin:0 14px 8px;background:var(--card);border:1px solid var(--border);border-radius:22px;padding:22px 20px;position:relative;overflow:hidden}
    .card::after{content:'';position:absolute;top:-30px;right:-30px;width:130px;height:130px;background:radial-gradient(circle,var(--glow),transparent 70%);border-radius:50%;pointer-events:none}
    .mode-tabs{display:flex;gap:8px;margin-bottom:20px}
    .mtab{flex:1;padding:10px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Vazirmatn',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;text-align:center}
    .mtab.on{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 4px 16px var(--glow)}
    .tp-row{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:18px}
    .tp-col{display:flex;flex-direction:column;align-items:center;gap:5px}
    .tp-col span{font-size:10px;color:var(--muted);letter-spacing:1px}
    .drum{background:var(--card2);border:1px solid var(--border);border-radius:14px;overflow:hidden;width:88px;height:130px;position:relative;cursor:ns-resize;user-select:none}
    .drum-inner{position:absolute;width:100%;transition:transform .1s}
    .drum-item{height:44px;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:800;color:var(--muted);transition:color .1s,font-size .1s}
    .drum-item.sel{color:var(--text);font-size:34px}
    .drum::before,.drum::after{content:'';position:absolute;left:0;right:0;height:40px;z-index:2;pointer-events:none}
    .drum::before{top:0;background:linear-gradient(to bottom,var(--card2),transparent)}
    .drum::after{bottom:0;background:linear-gradient(to top,var(--card2),transparent)}
    .drum-line{position:absolute;left:8px;right:8px;height:1px;background:var(--accent);opacity:.4;z-index:3}
    .drum-line.t{top:43px}.drum-line.b{bottom:43px}
    .tp-sep{font-size:32px;font-weight:800;color:var(--accent);margin-top:2px;line-height:1}
    .timer-wrap{display:none;flex-direction:column;align-items:center;gap:10px;margin-bottom:18px}
    .timer-wrap.show{display:flex}
    .timer-row{display:flex;align-items:center;gap:14px}
    .t-btn{width:44px;height:44px;border-radius:50%;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
    .t-btn:active{transform:scale(.9);background:var(--accent);border-color:var(--accent)}
    .t-num{font-size:52px;font-weight:800;width:110px;text-align:center;background:none;border:none;color:var(--text);font-family:'Vazirmatn',sans-serif;-moz-appearance:textfield;appearance:textfield;outline:none}
    .t-num::-webkit-outer-spin-button,.t-num::-webkit-inner-spin-button{-webkit-appearance:none}
    .t-label{font-size:14px;color:var(--muted)}
    .t-preview{font-size:13px;color:var(--green);min-height:18px;text-align:center}
    .quick-row{display:flex;gap:7px;flex-wrap:wrap;justify-content:center}
    .qbtn{padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Vazirmatn',sans-serif;font-size:12px;cursor:pointer;transition:all .15s}
    .qbtn:active{background:var(--card2);border-color:var(--accent2);color:var(--accent2)}
    .inp{background:var(--card2);border:1px solid var(--border);color:var(--text);font-family:'Vazirmatn',sans-serif;font-size:14px;width:100%;padding:11px 15px;border-radius:12px;outline:none;margin-bottom:10px;transition:border-color .2s}
    .inp::placeholder{color:var(--muted)}.inp:focus{border-color:var(--accent)}
    .snd-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
    .snd-label{font-size:12px;color:var(--muted);flex-shrink:0}
    .snd-sel{background:var(--card2);border:1px solid var(--border);color:var(--text);font-family:'Vazirmatn',sans-serif;font-size:13px;flex:1;padding:9px 12px;border-radius:10px;appearance:none;-webkit-appearance:none;cursor:pointer;outline:none}
    .up-btn{background:var(--card2);border:1px solid var(--border);color:var(--muted);padding:9px 13px;border-radius:10px;cursor:pointer;font-size:17px;transition:all .2s;flex-shrink:0}
    .up-btn:active{border-color:var(--accent2);color:var(--accent2)}
    .days-row{display:flex;gap:5px;margin-bottom:18px}
    .dbtn{flex:1;padding:8px 3px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Vazirmatn',sans-serif;font-size:11px;cursor:pointer;transition:all .15s;text-align:center}
    .dbtn.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}
    .add-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--accent),#b02030);border:none;border-radius:14px;color:#fff;font-family:'Vazirmatn',sans-serif;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 6px 22px var(--glow);transition:transform .15s,box-shadow .15s}
    .add-btn:active{transform:scale(.98);box-shadow:0 3px 10px var(--glow)}
    .list{padding:0 14px;display:flex;flex-direction:column;gap:9px}
    .ai{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px 18px;display:flex;align-items:center;gap:12px;transition:border-color .2s,opacity .3s}
    .ai.ring{border-color:var(--accent);box-shadow:0 0 18px var(--glow)}
    .ai.off{opacity:.38}
    .ai-left{flex:1}
    .ai-time{font-size:32px;font-weight:800;letter-spacing:-1px;line-height:1}
    .ai-lbl{font-size:12px;color:var(--muted);margin-top:2px}
    .ai-days{font-size:10px;color:var(--accent2);margin-top:3px}
    .ai-cd{font-size:11px;color:var(--green);margin-top:3px}
    .ai-right{display:flex;flex-direction:column;align-items:flex-end;gap:9px}
    .tog{position:relative;width:46px;height:25px}
    .tog input{opacity:0;width:0;height:0}
    .tog-s{position:absolute;inset:0;background:var(--border);border-radius:30px;cursor:pointer;transition:background .2s}
    .tog-s::before{content:'';position:absolute;width:19px;height:19px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .2s}
    .tog input:checked+.tog-s{background:var(--accent)}
    .tog input:checked+.tog-s::before{transform:translateX(21px)}
    .del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:3px;transition:color .2s}
    .del-btn:active{color:var(--accent)}
    .empty{text-align:center;padding:36px 20px;color:var(--muted)}
    .empty .ei{font-size:44px;margin-bottom:10px}
    .empty p{font-size:13px;line-height:1.8}
    .ring-ov{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.93);flex-direction:column;align-items:center;justify-content:center;gap:20px;text-align:center}
    .ring-ov.show{display:flex}
    .ring-icon{font-size:76px;animation:rshake .45s infinite alternate}
    @keyframes rshake{from{transform:rotate(-14deg) scale(1)}to{transform:rotate(14deg) scale(1.1)}}
    .ring-t{font-size:62px;font-weight:800;background:linear-gradient(135deg,#fff,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .ring-l{font-size:18px;color:var(--muted)}
    .ring-stop{padding:16px 56px;background:var(--accent);border:none;border-radius:100px;color:#fff;font-family:'Vazirmatn',sans-serif;font-size:17px;font-weight:700;cursor:pointer;animation:pbtn 1s infinite;box-shadow:0 8px 28px var(--glow)}
    @keyframes pbtn{0%,100%{box-shadow:0 8px 28px var(--glow)}50%{box-shadow:0 8px 44px rgba(233,69,96,.65)}}
    .ring-snz{padding:11px 32px;background:var(--card2);border:1px solid var(--border);border-radius:100px;color:var(--muted);font-family:'Vazirmatn',sans-serif;font-size:13px;cursor:pointer}
    .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--card2);border:1px solid var(--border);color:var(--text);font-family:'Vazirmatn',sans-serif;font-size:13px;padding:11px 22px;border-radius:100px;z-index:200;transition:transform .28s ease;white-space:nowrap}
    .toast.show{transform:translateX(-50%) translateY(0)}
    #fileInput{display:none}

    /* ── SPLASH ── */
    #splash{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity .7s ease}
    #splash.fade{opacity:0;pointer-events:none}
    .splash-logo{width:120px;height:120px;object-fit:contain;border-radius:28px;animation:splashPop .65s cubic-bezier(.34,1.56,.64,1) both}
    @keyframes splashPop{from{transform:scale(.2);opacity:0}to{transform:scale(1);opacity:1}}
    .splash-name{font-size:28px;font-weight:800;background:linear-gradient(130deg,#fff 20%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:fadeUp .5s .35s both}
    .splash-tagline{font-size:13px;color:var(--muted);animation:fadeUp .5s .55s both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>

<!-- SPLASH SCREEN -->
<div id="splash">
  <img class="splash-logo" src="logo.png" alt="logo" onerror="this.style.fontSize='80px';this.outerHTML='<div style=font-size:80px>⏰</div>'"/>
  <div class="splash-name">ئاگادارکەر</div>
  <div class="splash-tagline">بەرنامەی کاتبەندی</div>
</div>

<div class="orbs"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>

<div class="ring-ov" id="ringOv">
  <div class="ring-icon">🔔</div>
  <div class="ring-t" id="rTime">--:--</div>
  <div class="ring-l" id="rLabel">ئاگادارکەر</div>
  <button class="ring-stop" onclick="stopAlarm()">⏹ وەستان</button>
  <button class="ring-snz" onclick="snoozeAlarm()">😴 ٥ خولەک کتوپڕ</button>
</div>

<input type="file" id="fileInput" accept="audio/*" onchange="onAudioUpload(event)"/>

<div class="wrap">
  <div class="hdr">
    <div class="clock" id="clk">00:00:00</div>
    <div class="dateline" id="dtl">—</div>
  </div>

  <div class="slabel">▸ ئاگادارکەری نوێ</div>
  <div class="card">
    <div class="mode-tabs">
      <button class="mtab on" id="tabClock" onclick="setMode('clock')">⏰ کاتژمێر</button>
      <button class="mtab" id="tabTimer" onclick="setMode('timer')">⏱ خولەک دیکە</button>
    </div>

    <div class="tp-row" id="clockPicker">
      <div class="tp-col">
        <span>کاتژمێر</span>
        <div class="drum" id="drumH">
          <div class="drum-inner" id="drumHInner"></div>
          <div class="drum-line t"></div><div class="drum-line b"></div>
        </div>
      </div>
      <div class="tp-sep">:</div>
      <div class="tp-col">
        <span>خولەک</span>
        <div class="drum" id="drumM">
          <div class="drum-inner" id="drumMInner"></div>
          <div class="drum-line t"></div><div class="drum-line b"></div>
        </div>
      </div>
    </div>

    <div class="timer-wrap" id="timerPicker">
      <div class="timer-row">
        <button class="t-btn" onclick="adjMin(-5)">－</button>
        <input class="t-num" id="tNum" type="number" min="1" max="1440" value="10" oninput="updatePreview()"/>
        <button class="t-btn" onclick="adjMin(5)">＋</button>
      </div>
      <div class="t-label">خولەک دیکە ئاگادارم بکە</div>
      <div class="quick-row">
        <button class="qbtn" onclick="setMin(5)">٥ خولەک</button>
        <button class="qbtn" onclick="setMin(10)">١٠ خولەک</button>
        <button class="qbtn" onclick="setMin(15)">١٥ خولەک</button>
        <button class="qbtn" onclick="setMin(30)">٣٠ خولەک</button>
        <button class="qbtn" onclick="setMin(60)">١ کاتژمێر</button>
      </div>
      <div class="t-preview" id="tPreview"></div>
    </div>

    <input class="inp" id="lblInp" type="text" placeholder="ناوی ئاگادارکەر (بەیانیان، درێژخوێندن…)" maxlength="40"/>
    <div class="snd-row">
      <span class="snd-label">🔊</span>
      <select class="snd-sel" id="sndSel">
        <option value="beep">Beep کلاسیک</option>
        <option value="gentle">هێمن</option>
        <option value="urgent">بەپەل</option>
        <option value="digital">دیجیتاڵ</option>
        <option value="custom" id="custOpt" style="display:none">🎵 دەنگی خۆت</option>
      </select>
      <button class="up-btn" onclick="document.getElementById('fileInput').click()">📁</button>
    </div>
    <div style="margin-bottom:8px">
      <button id="everyDayBtn" onclick="toggleEveryDay()" style="width:100%;padding:9px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Vazirmatn',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;letter-spacing:.3px">🔁 هەموو ڕۆژ</button>
    </div>
    <div class="days-row">
      <button class="dbtn" data-d="0">ی</button>
      <button class="dbtn" data-d="1">د</button>
      <button class="dbtn" data-d="2">س</button>
      <button class="dbtn" data-d="3">چ</button>
      <button class="dbtn" data-d="4">پ</button>
      <button class="dbtn" data-d="5">ه‍</button>
      <button class="dbtn" data-d="6">ش</button>
    </div>
    <button class="add-btn" onclick="addAlarm()">＋ زیادکردنی ئاگادارکەر</button>
  </div>

  <div class="slabel">▸ ئاگادارکەرەکان</div>
  <div class="list" id="aList"></div>
</div>

<div class="toast" id="toast"></div>

<script>
let alarms=JSON.parse(localStorage.getItem('ku_alarms')||'[]');
let mode='clock',selH=new Date().getHours(),selM=0;
let custBuf=null,ringingAlarm=null,ringIv=null,aCtx=null,oscs=[];
const pad=n=>String(n).padStart(2,'0');
function ac(){if(!aCtx)aCtx=new(window.AudioContext||window.webkitAudioContext)();return aCtx}

// CLOCK
function tick(){
  const n=new Date();
  document.getElementById('clk').textContent=`${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
  const D=['یەکشەممە','دووشەممە','سێشەممە','چوارشەممە','پێنجشەممە','هەینی','شەممە'];
  const Mo=['کانوونی دووەم','شوبات','ئازار','نیسان','ئایار','حوزەیران','تەمموز','ئاب','ئەیلوول','تشرینی یەکەم','تشرینی دووەم','کانوونی یەکەم'];
  document.getElementById('dtl').textContent=`${D[n.getDay()]} — ${n.getDate()} ${Mo[n.getMonth()]} ${n.getFullYear()}`;
}
setInterval(tick,1000);tick();

// DRUM
const IH=44;
function buildDrum(id,count){
  const el=document.getElementById(id);el.innerHTML='';
  for(let i=0;i<count;i++){const d=document.createElement('div');d.className='drum-item';d.textContent=pad(i);el.appendChild(d);}
}
function renderDrum(id,val){
  const el=document.getElementById(id);
  el.querySelectorAll('.drum-item').forEach((it,i)=>it.classList.toggle('sel',i===val));
  el.style.transform=`translateY(${-(val*IH)+(130/2-IH/2)}px)`;
  el.style.transition='transform .18s ease';
}
function initDrum(drumId,innerId,count,getV,setV){
  buildDrum(innerId,count);renderDrum(innerId,getV());
  const drum=document.getElementById(drumId);
  let sy=0,sv=0,drag=false;
  const clamp=v=>Math.max(0,Math.min(count-1,v));
  const move=y=>{const delta=Math.round((sy-y)/IH);setV(clamp(sv+delta));renderDrum(innerId,getV());};
  drum.addEventListener('mousedown',e=>{sy=e.clientY;sv=getV();drag=true;e.preventDefault();});
  drum.addEventListener('touchstart',e=>{sy=e.touches[0].clientY;sv=getV();drag=true;},{passive:true});
  document.addEventListener('mousemove',e=>{if(drag)move(e.clientY);});
  document.addEventListener('touchmove',e=>{if(drag)move(e.touches[0].clientY);},{passive:true});
  document.addEventListener('mouseup',()=>drag=false);
  document.addEventListener('touchend',()=>drag=false);
  drum.addEventListener('wheel',e=>{e.preventDefault();setV(clamp(getV()+(e.deltaY>0?1:-1)));renderDrum(innerId,getV());},{passive:false});
}
initDrum('drumH','drumHInner',24,()=>selH,v=>selH=v);
initDrum('drumM','drumMInner',60,()=>selM,v=>selM=v);

// MODE
function setMode(m){
  mode=m;
  document.getElementById('tabClock').classList.toggle('on',m==='clock');
  document.getElementById('tabTimer').classList.toggle('on',m==='timer');
  document.getElementById('clockPicker').style.display=m==='clock'?'flex':'none';
  document.getElementById('timerPicker').classList.toggle('show',m==='timer');
  if(m==='timer')updatePreview();
}

// TIMER
function adjMin(d){const inp=document.getElementById('tNum');let v=(parseInt(inp.value)||0)+d;if(v<1)v=1;if(v>1440)v=1440;inp.value=v;updatePreview();}
function setMin(v){document.getElementById('tNum').value=v;updatePreview();}
function updatePreview(){
  const m=parseInt(document.getElementById('tNum').value)||0;
  if(m<1){document.getElementById('tPreview').textContent='';return;}
  const t=new Date(Date.now()+m*60000);
  document.getElementById('tPreview').textContent=`→ کاتی ئاگادارکەر: ${pad(t.getHours())}:${pad(t.getMinutes())}`;
}
setInterval(()=>{if(mode==='timer')updatePreview();},15000);

// DAYS
document.querySelectorAll('.dbtn').forEach(b=>b.addEventListener('click',()=>{
  b.classList.toggle('on');
  syncEveryDayBtn();
}));

function toggleEveryDay(){
  const allOn=document.querySelectorAll('.dbtn.on').length===7;
  document.querySelectorAll('.dbtn').forEach(b=>b.classList.toggle('on',!allOn));
  syncEveryDayBtn();
}

function syncEveryDayBtn(){
  const allOn=document.querySelectorAll('.dbtn.on').length===7;
  const btn=document.getElementById('everyDayBtn');
  if(allOn){
    btn.style.background='var(--green)';btn.style.borderColor='var(--green)';
    btn.style.color='#000';btn.style.fontWeight='700';
  } else {
    btn.style.background='transparent';btn.style.borderColor='var(--border)';
    btn.style.color='var(--muted)';btn.style.fontWeight='600';
  }
}

// AUDIO UPLOAD
async function onAudioUpload(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=async ev=>{
    try{custBuf=await ac().decodeAudioData(ev.target.result.slice(0));
      document.getElementById('custOpt').style.display='block';
      document.getElementById('custOpt').textContent='🎵 '+f.name;
      document.getElementById('sndSel').value='custom';toast('✅ دەنگەکە باربکرا');}
    catch{toast('❌ کێشە لە دەنگەکە');}
  };r.readAsArrayBuffer(f);
}

// SOUND
function playSound(type){
  stopSound();const ctx=ac();if(ctx.state==='suspended')ctx.resume();
  if(type==='custom'&&custBuf){const s=ctx.createBufferSource();s.buffer=custBuf;s.loop=true;s.connect(ctx.destination);s.start();oscs=[s];return;}
  const P={beep:[800,0,800,0,800],gentle:[523,659,784],urgent:[1000,800,1000,800,1000,800],digital:[440,880,440,880]};
  const G={beep:.3,gentle:.55,urgent:.1,digital:.18};
  beepPat(ctx,P[type]||P.beep,G[type]||.3);
}
function beepPat(ctx,freqs,gap){
  let t=ctx.currentTime;
  freqs.forEach(f=>{if(f===0){t+=gap;return;}
    const o=ctx.createOscillator(),g=ctx.createGain();o.frequency.value=f;o.type='sine';
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.7,t+.02);g.gain.setValueAtTime(.7,t+.15);g.gain.linearRampToValueAtTime(0,t+.2);
    o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+.25);oscs.push(o);t+=.25+gap;});
  setTimeout(()=>{if(ringingAlarm)playSound(ringingAlarm.sound);},(t-ctx.currentTime+.3)*1000);
}
function stopSound(){oscs.forEach(o=>{try{o.stop();}catch(e){}});oscs=[];}

// ADD
function addAlarm(){
  let h,m;
  if(mode==='clock'){h=selH;m=selM;}
  else{const mins=parseInt(document.getElementById('tNum').value);if(!mins||mins<1){toast('⚠️ ژمارەیەکی دروست بنووسە');return;}const t=new Date(Date.now()+mins*60000);h=t.getHours();m=t.getMinutes();}
  const label=document.getElementById('lblInp').value.trim()||(mode==='timer'?`دوای ${document.getElementById('tNum').value} خولەک`:'ئاگادارکەر');
  const sound=document.getElementById('sndSel').value;
  const days=[...document.querySelectorAll('.dbtn.on')].map(b=>parseInt(b.dataset.d));
  alarms.push({id:Date.now(),hour:h,min:m,label,sound,days,enabled:true});
  save();render();
  toast(`✅ ${pad(h)}:${pad(m)} — ${label}`);
  document.getElementById('lblInp').value='';
  document.querySelectorAll('.dbtn.on').forEach(b=>b.classList.remove('on'));
  if(mode==='timer')document.getElementById('tNum').value=10;
}

// RENDER
function render(){
  const el=document.getElementById('aList');
  if(!alarms.length){el.innerHTML='<div class="empty"><div class="ei">⏰</div><p>هێشتا هیچ ئاگادارکەرێکت دانەناوە<br/>یەکێک زیاد بکە لە سەرەوە</p></div>';return;}
  const DN=['ی','د','س','چ','پ','ه‍','ش'];
  el.innerHTML=alarms.map(a=>{
    const ts=`${pad(a.hour)}:${pad(a.min)}`,ds=a.days.length===7?'🔁 هەموو ڕۆژ':a.days.length?a.days.map(d=>DN[d]).join(' '):'یەک جار',cd=countdown(a);
    return`<div class="ai ${a.enabled?'':'off'}"><div class="ai-left"><div class="ai-time">${ts}</div><div class="ai-lbl">${a.label}</div><div class="ai-days">${ds}</div>${a.enabled?`<div class="ai-cd">${cd}</div>`:''}</div><div class="ai-right"><label class="tog"><input type="checkbox" ${a.enabled?'checked':''} onchange="togAlarm(${a.id})"><span class="tog-s"></span></label><button class="del-btn" onclick="delAlarm(${a.id})">🗑</button></div></div>`;
  }).join('');
}
function countdown(a){
  if(!a.enabled)return'';
  const n=new Date();let nx=new Date();nx.setHours(a.hour,a.min,0,0);
  if(nx<=n)nx.setDate(nx.getDate()+1);
  if(a.days.length){for(let i=0;i<8;i++){const d=new Date(n);d.setDate(d.getDate()+i);d.setHours(a.hour,a.min,0,0);if(d>n&&a.days.includes(d.getDay())){nx=d;break;}}}
  const diff=Math.round((nx-n)/60000);
  if(diff<60)return`⏳ ${diff} خولەک دیکە`;return`⏳ ${Math.floor(diff/60)} کاتژمێر ${diff%60} خولەک دیکە`;
}
function togAlarm(id){const a=alarms.find(x=>x.id===id);if(a){a.enabled=!a.enabled;save();render();}}
function delAlarm(id){alarms=alarms.filter(x=>x.id!==id);save();render();toast('🗑 سڕایەوە');}

// RING
function ringAlarm(a){
  ringingAlarm=a;
  document.getElementById('rTime').textContent=`${pad(a.hour)}:${pad(a.min)}`;
  document.getElementById('rLabel').textContent=a.label;
  document.getElementById('ringOv').classList.add('show');
  playSound(a.sound);
  if(navigator.vibrate)ringIv=setInterval(()=>navigator.vibrate([500,200,500]),1200);
  if(window.Capacitor&&Capacitor.isPluginAvailable('LocalNotifications')){
    Capacitor.Plugins.LocalNotifications.schedule({notifications:[{title:'⏰ '+a.label,body:`کاتی ${pad(a.hour)}:${pad(a.min)} گەیشتە`,id:a.id,schedule:{at:new Date()},sound:null,smallIcon:'ic_stat_icon_config_sample'}]});
  }
}
function stopAlarm(){
  stopSound();clearInterval(ringIv);if(navigator.vibrate)navigator.vibrate(0);
  document.getElementById('ringOv').classList.remove('show');
  if(ringingAlarm&&ringingAlarm.days.length===0){const a=alarms.find(x=>x.id===ringingAlarm.id);if(a){a.enabled=false;save();render();}}
  ringingAlarm=null;
}
function snoozeAlarm(){
  stopSound();clearInterval(ringIv);if(navigator.vibrate)navigator.vibrate(0);
  document.getElementById('ringOv').classList.remove('show');
  if(ringingAlarm){const nx=new Date(Date.now()+5*60000);alarms.push({...ringingAlarm,id:Date.now(),hour:nx.getHours(),min:nx.getMinutes(),label:'😴 '+ringingAlarm.label,days:[]});save();render();toast('😴 ٥ خولەک دیکە ئاگادار دەکریتەوە');}
  ringingAlarm=null;
}

// CHECK
function checkAlarms(){
  if(ringingAlarm)return;
  const n=new Date(),H=n.getHours(),M=n.getMinutes(),S=n.getSeconds();
  if(S>2)return;
  alarms.forEach(a=>{if(!a.enabled)return;if(a.hour!==H||a.min!==M)return;if(a.days.length&&!a.days.includes(n.getDay()))return;ringAlarm(a);});
}
setInterval(checkAlarms,1000);

function save(){localStorage.setItem('ku_alarms',JSON.stringify(alarms));}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

window.addEventListener('load',async()=>{
  if(window.Capacitor&&Capacitor.isPluginAvailable('LocalNotifications'))await Capacitor.Plugins.LocalNotifications.requestPermissions();
  setMode('clock');render();setInterval(render,60000);
  setTimeout(()=>{const s=document.getElementById('splash');if(s){s.classList.add('fade');setTimeout(()=>s.remove(),750);}},2000);
});
['touchstart','click'].forEach(ev=>document.addEventListener(ev,()=>{const c=ac();if(c.state==='suspended')c.resume();},{once:true}));
</script>
